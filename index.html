  <script>
    (function () {
      var base = 'https://lorvixsolutions.in';
      var pages = {
        '/': {
          title: 'Lorvix Solutions | Website Development Company in Chennai',
          description: 'Lorvix Solutions builds fast, mobile-friendly business websites, product catalogues, e-commerce sites, and custom software for Chennai, India, and remote clients.'
        },
        '/web-development': {
          title: 'Web Design Company in Chennai | Website Development Services',
          description: 'Chennai website development company building fast, mobile-first, SEO-ready business websites with live portfolio proof and direct developer support.'
        },
        '/web-design-company-chennai': {
          title: 'Web Design Company in Chennai | Website Development Services',
          description: 'Lorvix Solutions builds clean, fast, mobile-first websites for Chennai businesses that need stronger trust, better enquiries, and a practical online presence.'
        },
        '/website-design-cost-chennai': {
          title: 'Website Design Cost in Chennai | Web Development Packages',
          description: 'Understand website design cost in Chennai, including business website, redesign, catalogue, e-commerce, and custom web development package factors.'
        },
        '/business-website-design-chennai': {
          title: 'Business Website Design Chennai | Industry Website Developers',
          description: 'Industry-focused business website design in Chennai for travel, manufacturing, clinics, retail, real estate, restaurants, logistics, and local service companies.'
        },
        '/lorvix-billing': {
          title: 'Free GST Billing Software with Expense & Due Tracking | Lorvix Billing',
          description: 'Lorvix Billing helps Indian small businesses create GST invoices, track expenses, monitor dues, and understand profit and loss from a simple web dashboard.'
        },
        '/contact': {
          title: 'Contact Lorvix Solutions | Chennai Website Quote',
          description: 'Share your website or software requirements with Lorvix Solutions and get a practical Chennai web development quote with timeline and scope guidance.'
        }
      };

      var path = window.location.pathname.replace(/\/$/, '') || '/';
      var page = pages[path];
      if (!page) return;

      var title = page.title;
      var description = page.description;
      var canonical = base + (path === '/' ? '/' : path);

      document.title = title;

      function setMeta(attr, key, content) {
        var selector = 'meta[' + attr + '="' + key + '"]';
        var tag = document.querySelector(selector);
        if (!tag) {
          tag = document.createElement('meta');
          tag.setAttribute(attr, key);
          document.head.appendChild(tag);
        }
        tag.setAttribute('content', content);
      }

      function setLink(rel, href) {
        var tag = document.querySelector('link[rel="' + rel + '"]');
        if (!tag) {
          tag = document.createElement('link');
          tag.setAttribute('rel', rel);
          document.head.appendChild(tag);
        }
        tag.setAttribute('href', href);
      }

      setMeta('name', 'description', description);
      setMeta('property', 'og:title', title);
      setMeta('property', 'og:description', description);
      setMeta('property', 'og:url', canonical);
      setMeta('name', 'twitter:title', title);
      setMeta('name', 'twitter:description', description);
      setLink('canonical', canonical);
    })();
  </script>
